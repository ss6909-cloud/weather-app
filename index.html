<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #64f4ef, #8dd9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.95rem;
            color: #a0a0b0;
            font-weight: 400;
        }

        .search-section {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(100, 244, 239, 0.5);
            box-shadow: 0 0 20px rgba(100, 244, 239, 0.2);
        }

        .search-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #64f4ef, #8dd9ff);
            color: #0f0f1e;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(100, 244, 239, 0.3);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #64f4ef;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .loading p {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        .weather-card.visible {
            display: block;
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #64f4ef, #8dd9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-condition {
            font-size: 1.1rem;
            color: #a0a0b0;
            margin-bottom: 25px;
        }

        .temperature {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .feels-like {
            font-size: 0.95rem;
            color: #a0a0b0;
            margin-bottom: 30px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #a0a0b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #64f4ef;
        }

        .error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff9a9a;
            padding: 18px 24px;
            border-radius: 12px;
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.3s ease-in;
        }

        .error.visible {
            display: block;
        }

        .error p {
            margin: 0;
            font-size: 0.95rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .search-section {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }

            .weather-card {
                padding: 30px 20px;
            }

            .city-name {
                font-size: 1.5rem;
            }

            .temperature {
                font-size: 2.5rem;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .detail-value {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.6rem;
            }

            .weather-card {
                padding: 25px 15px;
            }

            .city-name {
                font-size: 1.3rem;
            }

            .temperature {
                font-size: 2rem;
            }

            .feels-like {
                font-size: 0.85rem;
            }

            .detail-label {
                font-size: 0.75rem;
            }

            .detail-value {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weather</h1>
            <p>Get current weather for any city</p>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                class="search-input" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName"></div>
            <div class="weather-condition" id="weatherCondition"></div>
            <div class="temperature" id="temperature"></div>
            <div class="feels-like" id="feelsLike"></div>
            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
            </div>
        </div>

        <div class="error" id="error">
            <p id="errorMessage"></p>
        </div>
    </div>

    <script>
        // WMO Weather Code Mapping
        const WMO_CODE_MAP = {
            0: 'Clear sky',
            1: 'Mainly clear',
            2: 'Partly cloudy',
            3: 'Overcast',
            45: 'Fog',
            48: 'Foggy rime',
            51: 'Light drizzle',
            53: 'Moderate drizzle',
            55: 'Dense drizzle',
            61: 'Slight rain',
            63: 'Moderate rain',
            65: 'Heavy rain',
            71: 'Slight snow',
            73: 'Moderate snow',
            75: 'Heavy snow',
            77: 'Snow grains',
            80: 'Slight rain showers',
            81: 'Moderate rain showers',
            82: 'Violent rain showers',
            85: 'Slight snow showers',
            86: 'Heavy snow showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm with hail',
            99: 'Thunderstorm with major hail'
        };

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const weatherCard = document.getElementById('weatherCard');
        const error = document.getElementById('error');
        const cityName = document.getElementById('cityName');
        const weatherCondition = document.getElementById('weatherCondition');
        const temperature = document.getElementById('temperature');
        const feelsLike = document.getElementById('feelsLike');
        const windSpeed = document.getElementById('windSpeed');
        const humidity = document.getElementById('humidity');
        const errorMessage = document.getElementById('errorMessage');

        // Geocode city to coordinates
        async function geocodeCity(city) {
            try {
                const response = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`
                );
                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    showError('City not found. Please try another search.');
                    return null;
                }

                const result = data.results[0];
                return {
                    name: result.name,
                    country: result.country,
                    latitude: result.latitude,
                    longitude: result.longitude
                };
            } catch (err) {
                showError('Error fetching location data. Please try again.');
                console.error('Geocoding error:', err);
                return null;
            }
        }

        // Fetch weather data
        async function getWeather(latitude, longitude) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature,windspeed_10m`
                );
                const data = await response.json();
                return data.current_weather;
            } catch (err) {
                showError('Error fetching weather data. Please try again.');
                console.error('Weather fetch error:', err);
                return null;
            }
        }

        // Get humidity for the current hour
        async function getHumidity(latitude, longitude) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=relativehumidity_2m`
                );
                const data = await response.json();
                const now = new Date();
                const currentHour = now.getHours();
                return data.hourly.relativehumidity_2m[currentHour];
            } catch (err) {
                console.error('Humidity fetch error:', err);
                return 'N/A';
            }
        }

        // Get feels-like temperature for the current hour
        async function getFeelsLike(latitude, longitude) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=apparent_temperature`
                );
                const data = await response.json();
                const now = new Date();
                const currentHour = now.getHours();
                return Math.round(data.hourly.apparent_temperature[currentHour]);
            } catch (err) {
                console.error('Feels-like fetch error:', err);
                return 'N/A';
            }
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            error.classList.add('visible');
            weatherCard.classList.remove('visible');
            loading.classList.remove('active');
        }

        // Hide error message
        function hideError() {
            error.classList.remove('visible');
        }

        // Show loading state
        function showLoading() {
            loading.classList.add('active');
            weatherCard.classList.remove('visible');
            hideError();
        }

        // Display weather data
        async function displayWeather(locationData, weatherData, humidityData, feelsLikeData) {
            cityName.textContent = `${locationData.name}, ${locationData.country}`;
            weatherCondition.textContent = WMO_CODE_MAP[weatherData.weathercode] || 'Unknown';
            temperature.textContent = `${Math.round(weatherData.temperature)}°C`;
            feelsLike.textContent = `Feels like ${feelsLikeData}°C`;
            windSpeed.textContent = `${Math.round(weatherData.windspeed)} km/h`;
            humidity.textContent = `${humidityData}%`;

            loading.classList.remove('active');
            weatherCard.classList.add('visible');
            hideError();
        }

        // Search weather
        async function searchWeather() {
            const city = cityInput.value.trim();

            if (!city) {
                showError('Please enter a city name.');
                return;
            }

            showLoading();

            const locationData = await geocodeCity(city);
            if (!locationData) return;

            const weatherData = await getWeather(locationData.latitude, locationData.longitude);
            if (!weatherData) return;

            const humidityData = await getHumidity(locationData.latitude, locationData.longitude);
            const feelsLikeData = await getFeelsLike(locationData.latitude, locationData.longitude);

            displayWeather(locationData, weatherData, humidityData, feelsLikeData);
        }

        // Event listeners
        searchBtn.addEventListener('click', searchWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            cityInput.focus();
        });
    </script>
</body>
</html>
